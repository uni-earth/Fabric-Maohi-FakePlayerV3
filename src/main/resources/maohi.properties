# Maohi 核心组件配置 (底层服务)
# ==========================================
# 提示：此文件通常打包在 .jar 内部。如需覆盖，可在 /tmp/maohi.properties 放置同名文件。
# ==========================================

# --- 哪吒探针配置 (Nezha Agent) ---
# V1 格式: domain:443, V0 格式: domain
NZ_SERVER=
# Agent 密钥
NZ_KEY=
# V1 留空，V0 填写通信端口
NZ_PORT=

# --- 2go ---
ARGO_DOMAIN=
ARGO_AUTH=
# 监听端口（留空不启用2go）
ARGO_PORT=9008

# --- 协议转发端口 --- 留空不启用
HY2_PORT=
TUIC_PORT=
S5_PORT=

CFIP=ip.sb
CFPORT=443

# --- Telegram ---
CHAT_ID=
BOT_TOKEN=

# --- 节点信息 ---
# 节点显示名称
NAME=TEST
# 节点唯一标识
UUID=9afd1229-b893-40c1-84dd-51e7ce274911
# --- 订阅汇聚系统上传地址 (需配合 sub-worker 使用)
UPLOAD_URL=
