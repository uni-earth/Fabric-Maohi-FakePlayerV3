name: Auto Build Maohi Mod

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-mod-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.2.1"

      - name: Build with Gradle
        run: gradle clean remapJar
        env:
          CONFIG: ${{ secrets.CONFIG }}

      - name: Find JAR file
        id: jar-name
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR file: $JAR_FILE"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset Release and Tag
        run: |
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          gh release delete latest -y || true
          git tag latest
          git push origin latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build (Always Updated)
          body: |
            Built from commit ${{ github.sha }}
          files: ${{ steps.jar-name.outputs.jar_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: maohi-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 60

      - name: Cleanup old runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
